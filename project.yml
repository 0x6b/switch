name: Switch
options:
  bundleIdPrefix: io.warpnine
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
targets:
  Switch:
    type: application
    platform: macOS
    sources:
      - path: Switch
        excludes:
          - "Resources/AppIcon.svg"
    info:
      path: Switch/App/Info.plist
      properties:
        LSUIElement: true
        CFBundleName: Switch
        CFBundleDisplayName: Switch
        CFBundleShortVersionString: "0.3.2"
        NSAccessibilityUsageDescription: "Switch needs Accessibility access to read window lists and intercept Cmd+Tab / Opt+Tab globally."
        NSPrincipalClass: NSApplication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.warpnine.switch
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_IDENTITY: "-"
  SwitchTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SwitchTests
    dependencies:
      - target: Switch
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Switch.app/Contents/MacOS/Switch"
        GENERATE_INFOPLIST_FILE: YES
schemes:
  Switch:
    build:
      targets:
        Switch: all
        SwitchTests: [test]
    test:
      targets:
        - SwitchTests
