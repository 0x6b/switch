name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (e.g. 0.2.2). Defaults to the app's Info.plist value."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build release
        run: make build

      - name: Package app
        id: package
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          APP="build/DerivedData/Build/Products/Release/Switch.app"
          VERSION="${VERSION_INPUT:-$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$APP/Contents/Info.plist")}"
          ZIP="Switch-${VERSION}.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: Switch-${{ steps.package.outputs.version }}
          path: ${{ steps.package.outputs.zip }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" "${{ steps.package.outputs.zip }}" --clobber
